name: Publish to Maven Central

on:
  push:
    branches:
      - release

jobs:
  # Build SDK and Publish to Maven Central
  build-and-publish:
    name: Build & Publish SDK
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout kit-android code
        uses: actions/checkout@v4

      # Ship the bundle committed in this repo (no download). Guard that it matches the
      # pinned kit release so a stale/hand-edited bundle can never reach Maven Central.
      - name: Verify bridge bundle matches WALLETKIT_BRIDGE_TAG
        uses: ./.github/actions/verify-walletkit-bridge
        with:
          token: ${{ github.token }}

      - name: Populate dist-android from committed assets
        run: |
          mkdir -p dist-android
          cp TONWalletKit-Android/impl/src/main/assets/walletkit/* dist-android/
          echo "📦 Using committed bridge bundle:"
          ls -la dist-android/

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep "VERSION_NAME=" TONWalletKit-Android/gradle.properties | cut -d'=' -f2)
          BRIDGE_TAG=$(grep "WALLETKIT_BRIDGE_TAG=" TONWalletKit-Android/gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "bridge_tag=$BRIDGE_TAG" >> $GITHUB_OUTPUT
          echo "📦 SDK Version: $VERSION"
          echo "📦 Bridge tag: $BRIDGE_TAG"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: TONWalletKit-Android
        run: chmod +x gradlew

      - name: Sync WebView Assets
        working-directory: TONWalletKit-Android
        run: ./gradlew syncWalletKitWebViewAssets

      - name: Run unit tests
        working-directory: TONWalletKit-Android
        run: ./gradlew :impl:testDebugUnitTest

      - name: Build SDK (Release)
        working-directory: TONWalletKit-Android
        run: ./gradlew buildSdkRelease

      - name: Upload SDK AAR
        uses: actions/upload-artifact@v4
        with:
          name: sdk-aar
          path: TONWalletKit-Android/impl/build/outputs/aar/impl-release.aar
          retention-days: 7

      - name: Publish and Release to Maven Central
        working-directory: TONWalletKit-Android
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache -PVERSION_NAME=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Publishing summary
        run: |
          echo "🚀 Published to Maven Central"
          echo ""
          echo "📦 Artifact: org.ton:walletkit:${{ steps.version.outputs.version }}"
          echo "📦 Bridge tag: ${{ steps.version.outputs.bridge_tag }}"
