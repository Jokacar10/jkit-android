android.useAndroidX=true
android.enableJetifier=true
org.gradle.jvmargs=-Xmx2g -Dkotlin.daemon.jvm.options=-Xmx2g

# Library Publishing Configuration
GROUP=org.ton
VERSION_NAME=0.0.5
POM_ARTIFACT_ID=walletkit

# WalletKit JS bridge bundle provenance.
# The committed bundle under impl/src/main/assets/walletkit/ MUST match the
# walletkit-android-bridge assets of this ton-org/kit release tag. CI verifies the
# sha256 of the runtime files against that release's checksums.json. Bump manually
# when intentionally updating the bundle (and refresh the committed files to match).
WALLETKIT_BRIDGE_TAG=v1.0.0-alpha.3
