name: Publish to Maven Central

on:
  push:
    branches:
      - release

jobs:
  # Build SDK and Publish to Maven Central
  build-and-publish:
    name: Build & Publish SDK
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout kit-android code
        uses: actions/checkout@v4

      - name: Get latest kit release info
        id: kit-release
        env:
          # Draft releases are only visible to a token with push access to ton-org/kit,
          # so this must be a PAT / app token with that access — the default GITHUB_TOKEN
          # (scoped to this repo) cannot see drafts in another repo.
          KIT_TOKEN: ${{ secrets.KIT_RELEASE_TOKEN }}
        run: |
          # The /releases list endpoint includes drafts (sorted by created_at, newest first),
          # whereas /releases/latest skips drafts and prereleases. .[0] is the newest release
          # of any kind — stable, prerelease, or draft.
          RELEASES=$(curl -s \
            -H "Authorization: Bearer $KIT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ton-org/kit/releases?per_page=100")
          RELEASE_INFO=$(echo "$RELEASES" | jq '.[0]')
          if [ "$RELEASE_INFO" = "null" ] || [ -z "$RELEASE_INFO" ]; then
            echo "::error::No release found in ton-org/kit (check KIT_RELEASE_TOKEN has access)."
            exit 1
          fi
          TAG=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
          IS_DRAFT=$(echo "$RELEASE_INFO" | jq -r '.draft')
          # Draft asset browser_download_url is not directly downloadable; use the asset API
          # URL (.url) with an octet-stream Accept header + auth instead.
          ANDROID_BRIDGE_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name | contains("walletkit-android-bridge")) | select(.name | endswith(".tgz")) | .url')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "android_bridge_url=$ANDROID_BRIDGE_URL" >> $GITHUB_OUTPUT
          echo "📦 Using kit release: $TAG (draft=$IS_DRAFT)"
          echo "📦 Android bridge asset URL: $ANDROID_BRIDGE_URL"

      - name: Download and extract Android bridge bundle
        env:
          KIT_TOKEN: ${{ secrets.KIT_RELEASE_TOKEN }}
        run: |
          mkdir -p dist-android
          curl -sL \
            -H "Authorization: Bearer $KIT_TOKEN" \
            -H "Accept: application/octet-stream" \
            "${{ steps.kit-release.outputs.android_bridge_url }}" -o android-bridge.tgz
          tar -xzf android-bridge.tgz
          cp package/dist/* dist-android/
          rm -rf package android-bridge.tgz
          echo "📦 Extracted Android bridge bundle:"
          ls -la dist-android/

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep "VERSION_NAME=" TONWalletKit-Android/gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 SDK Version: $VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: TONWalletKit-Android
        run: chmod +x gradlew

      - name: Sync WebView Assets
        working-directory: TONWalletKit-Android
        run: ./gradlew syncWalletKitWebViewAssets

      - name: Run unit tests
        working-directory: TONWalletKit-Android
        run: ./gradlew :impl:testDebugUnitTest

      - name: Build SDK (Release)
        working-directory: TONWalletKit-Android
        run: ./gradlew buildSdkRelease

      - name: Upload SDK AAR
        uses: actions/upload-artifact@v4
        with:
          name: sdk-aar
          path: TONWalletKit-Android/impl/build/outputs/aar/impl-release.aar
          retention-days: 7

      - name: Publish and Release to Maven Central
        working-directory: TONWalletKit-Android
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache -PVERSION_NAME=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Publishing summary
        run: |
          echo "🚀 Published to Maven Central"
          echo ""
          echo "📦 Artifact: org.ton:walletkit:${{ steps.version.outputs.version }}"
          echo "📦 Using kit release: ${{ steps.kit-release.outputs.tag }}"
